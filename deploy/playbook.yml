---
# Deploys meteo-server and InfluxDB 3 Core to a single Docker Compose host.
# Expects docker_dir to be set in inventory (e.g. /home/ubuntu/docker/meteo-server).
# Required CI/CD variables: INFLUXDB_ADMIN_TOKEN, and those consumed by templates/.env.j2.
- name: Deploy
  hosts: all
  become: false
  vars:
    influxdb_data_dir: "{{ lookup('env', 'INFLUXDB_DATA_DIR') | default('./data', true) }}"
    influxdb_data_path: "{{ influxdb_data_dir if influxdb_data_dir.startswith('/') else docker_dir ~ '/' ~ (influxdb_data_dir | regex_replace('^\\./', '')) }}"
    influxdb_database: "{{ lookup('env', 'INFLUXDB_DATABASE') | default('meteo', true) }}"
    influxdb_port: "{{ lookup('env', 'INFLUXDB_PORT') | default('8181', true) }}"

  tasks:
    - name: Ensure {{ docker_dir }} exists
      file:
        path: "{{ docker_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Ensure InfluxDB data directory exists
      file:
        path: "{{ influxdb_data_path }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Ensure InfluxDB plugin directory exists
      file:
        path: "{{ influxdb_data_path }}/plugins"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    # InfluxDB 3 Core reads the admin token from a JSON file pointed to by
    # INFLUXDB3_ADMIN_TOKEN_FILE rather than a plain env var, to avoid token
    # exposure in process listings. The JSON format is required by InfluxDB 3.
    - name: Deploy InfluxDB admin token file
      copy:
        content: |
          {
            "token": {{ lookup('env', 'INFLUXDB_ADMIN_TOKEN') | to_json }},
            "name": "meteo-admin",
            "description": "Meteo server deployment admin token"
          }
        dest: "{{ influxdb_data_path }}/admin-token"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      no_log: true

    - name: Deploy compose environment file
      template:
        src: templates/.env.j2
        dest: "{{ docker_dir }}/.env"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      no_log: true

    - name: Deploy compose file
      copy:
        src: templates/compose.yaml
        dest: "{{ docker_dir }}/compose.yaml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Pull latest image
      command: docker compose pull
      args:
        chdir: "{{ docker_dir }}"

    # --force-recreate ensures the new image replaces the running container
    # even when the compose config hash is unchanged (e.g. env-only redeploys).
    - name: Run docker compose up -d --force-recreate
      command: docker compose up -d --force-recreate
      args:
        chdir: "{{ docker_dir }}"

    - name: Wait for InfluxDB to be ready
      wait_for:
        host: localhost
        port: "{{ influxdb_port }}"
        delay: 2
        timeout: 30

    # 409 means the database already exists, which is expected on re-deploys.
    # changed_when distinguishes first creation (200) from a no-op (409).
    - name: Ensure meteo database exists in InfluxDB
      uri:
        url: "http://localhost:{{ influxdb_port }}/api/v3/configure/database"
        method: POST
        body_format: json
        body:
          db: "{{ influxdb_database }}"
        headers:
          Authorization: "Bearer {{ lookup('env', 'INFLUXDB_ADMIN_TOKEN') }}"
        status_code:
          - 200
          - 201
          - 409
      register: influxdb_db
      changed_when: influxdb_db.status == 200
      no_log: true
